name: Deploy blog

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: 40ants/setup-lisp@v3
        with:
          asdf-system: coleslaw

      - name: Install coleslaw
        run: |
          ros install coleslaw-org/coleslaw
          echo "$HOME/.roswell/bin" >> "$GITHUB_PATH"

      - name: Copy theme
        run: |
          coleslaw copy-theme hyde

      - name: Build site
        run: coleslaw generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/coleslaw
          publish_branch: gh-pages
          cname: aplacaba.info
